<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京賃貸検索</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <div class="wrap header-row">
        <div>
            <h1>東京賃貸検索</h1>
            <p>区・家賃・間取り・徒歩分から条件を絞り込めます。</p>
        </div>
        <nav class="header-nav">
            <a href="/" class="nav-link nav-link--active">検索</a>
            <a href="/user" class="nav-link">マイページ</a>
        </nav>
    </div>
</header>
<main class="wrap">
    <section class="panel">
        <h2>検索フォーム</h2>
        <form id="searchForm" class="grid">
            <div class="full-span">
                <label for="wardPanel">区の絞り込み（複数選択可）</label>
                <div id="wardPanel" class="ward-panel" aria-label="区の絞り込み"></div>
                <input id="ward" name="ward" type="hidden">
            </div>
            <div>
                <label for="rentMin">家賃下限</label>
                <input id="rentMin" name="rentMin" type="number" placeholder="80000">
            </div>
            <div>
                <label for="rentMax">家賃上限</label>
                <input id="rentMax" name="rentMax" type="number" placeholder="150000">
            </div>
            <div>
                <label for="layout">間取り</label>
                <input id="layout" name="layout" placeholder="例: 1K / 1LDK">
            </div>
            <div>
                <label for="walkMinutesMax">徒歩分以内</label>
                <input id="walkMinutesMax" name="walkMinutesMax" type="number" placeholder="10">
            </div>
            <div>
                <label for="hasPriceChanges">価格変動</label>
                <label class="check-option">
                    <input id="hasPriceChanges" name="hasPriceChanges" type="checkbox" value="true">
                    <span>価格変動がある物件のみ</span>
                </label>
            </div>
            <div>
                <label for="size">表示件数</label>
                <select id="size" name="size">
                    <option value="10">10件</option>
                    <option value="20" selected>20件</option>
                    <option value="50">50件</option>
                </select>
            </div>
            <div style="align-self:end;">
                <button type="submit">検索結果を見る</button>
            </div>
        </form>
    </section>

    <section class="panel">
        <h2>使い方</h2>
        <p class="summary">条件を入力すると、検索結果一覧ページで並び替え・ページ送り・比較選択ができます。</p>
    </section>
</main>
<script src="/js/api.js" defer></script>
<script src="/js/search.js" defer></script>
</body>
</html>
