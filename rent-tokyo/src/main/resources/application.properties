spring.application.name=rent-tokyo

# PostgreSQL datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rent_tokyo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Daily property import
rent-tokyo.import.enabled=true
rent-tokyo.import.cron=0 0 3 * * *
rent-tokyo.import.python-command=py
rent-tokyo.import.script-path=scripts/suumo_to_properties.py
rent-tokyo.import.args=--all-wards --pages 1
